<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Options avancées - DL. Mapping</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="options-page">
    <header>
      <div class="header-row">
        <div>
          <h1>DL. Mapping · Options avancées</h1>
          <p>Cadre, UI et layout avec 100 options configurables.</p>
          <p class="options-tip">💡 EXP: UI mode jour/nuit via l'option UI 1.</p>
        </div>
        <a class="options-link" href="index.html">⬅ Retour</a>
      </div>
    </header>

    <main class="options-main">
      <section class="panel option-panel" id="frame-panel">
        <h2>Frame (20 options)</h2>
        <div id="frame-options" class="options-grid"></div>
      </section>

      <section class="panel option-panel" id="ui-panel">
        <h2>UI (20 options)</h2>
        <div id="ui-options" class="options-grid"></div>
      </section>

      <section class="panel option-panel" id="layout-panel">
        <h2>Layout (60 options)</h2>
        <div id="layout-options" class="options-grid"></div>
      </section>
    </main>

    <footer class="brand-footer" aria-label="Signature DL.Logistiques">
      <div class="brand-badge" role="img" aria-label="DL.Logistiques copyright">
        <span class="brand-name">DL.Logistiques</span>
        <span class="brand-copy">© Tous droits réservés</span>
      </div>
    </footer>

    <script src="options.js"></script>
  </body>
</html>
