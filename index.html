<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Warehouse Planner iPhone</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Warehouse Planner</h1>
      <p>Dessine ton plan et renseigne les infos de bins.</p>
    </header>

    <main>
      <section class="toolbar">
        <button id="draw-mode" class="active">Tracer bin</button>
        <button id="select-mode">Sélectionner</button>
        <button id="duplicate-bin">Dupliquer</button>
        <button id="delete-bin">Supprimer</button>
        <button id="clear-all">Tout effacer</button>
      </section>

      <section class="toolbar options" aria-label="Options d'amélioration">
        <label class="toggle">
          <input type="checkbox" id="snap-toggle" checked />
          <span>Snap à la grille</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="grid-toggle" checked />
          <span>Afficher grille</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="labels-toggle" checked />
          <span>Afficher labels</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="autosave-toggle" checked />
          <span>Auto-save local</span>
        </label>
        <label class="inline-field">
          Taille grille
          <input type="number" id="grid-size" min="10" max="120" step="5" value="45" />
        </label>
      </section>

      <section class="board-wrap">
        <canvas id="warehouse-canvas" width="900" height="1300"></canvas>
      </section>

      <section class="panel" id="details-panel">
        <h2>Infos bin</h2>
        <p id="empty-state">Sélectionne un bin pour renseigner ses données.</p>

        <form id="bin-form" hidden>
          <label>
            Nom du bin
            <input type="text" id="bin-name" placeholder="Ex: Bin A-12" />
          </label>

          <label>
            Location
            <input type="text" id="bin-location" placeholder="Ex: Rangée 4, colonne 2" />
          </label>

          <label>
            Section
            <input type="text" id="bin-section" placeholder="Ex: Picking" />
          </label>

          <label>
            Zone
            <input type="text" id="bin-zone" placeholder="Ex: Zone froide" />
          </label>

          <label>
            Couleur du bin
            <input type="color" id="bin-color" value="#9bb7ff" />
          </label>

          <label class="toggle compact">
            <input type="checkbox" id="bin-locked" />
            <span>Verrouiller le bin (non déplaçable)</span>
          </label>

          <label>
            Notes
            <textarea id="bin-notes" rows="3" placeholder="Infos supplémentaires..."></textarea>
          </label>

          <button type="submit">Enregistrer les infos</button>
        </form>
      </section>

      <section class="toolbar secondary">
        <button id="undo-action">Annuler</button>
        <button id="redo-action">Rétablir</button>
        <button id="save-plan">Sauvegarder JSON</button>
        <button id="load-plan">Charger JSON</button>
        <button id="export-image">Exporter PNG</button>
        <input type="file" id="file-input" accept="application/json" hidden />
      </section>
    </main>

    <aside id="measure-tooltip" aria-live="polite">
      <div class="tooltip-handle">
        <span>Mesures du bin</span>
        <button id="measure-unit-toggle" type="button" aria-label="Changer le format des dimensions">📏 pi+po</button>
      </div>
      <div class="tooltip-grid">
        <p>
          <span>Longueur</span>
          <strong id="measure-length">--</strong>
        </p>
        <p>
          <span>Largeur</span>
          <strong id="measure-width">--</strong>
        </p>
      </div>
    </aside>

    <script src="app.js"></script>
  </body>
</html>
