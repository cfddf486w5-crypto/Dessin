<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>🧱 Map 3D - DL. Mapping</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="css/map3d.css" />
  </head>
  <body class="map3d-page">
    <header>
      <div class="header-row">
        <div>
          <h1>DL. Mapping · 🧱 Map 3D</h1>
          <p>Importe ton plan 2D et monte une maquette 3D interactive.</p>
        </div>
        <div class="header-actions">
          <a class="options-link" href="index.html">⬅ Retour au plan</a>
        </div>
      </div>
    </header>

    <main class="map3d-layout">
      <aside class="panel map3d-sidebar">
        <h2>Éditeur</h2>
        <div class="map3d-actions">
          <button id="import-image">🗺️ Importer plan 2D</button>
          <button id="import-json">Importer projet 3D</button>
          <button id="export-json">Exporter projet 3D</button>
          <button id="delete-project">Supprimer projet</button>
          <input id="image-input" type="file" accept="image/*" hidden />
          <input id="json-input" type="file" accept="application/json" hidden />
        </div>

        <div class="map3d-modes">
          <button data-mode="wall" class="active">Tracer murs</button>
          <button data-mode="door">Placer portes</button>
          <button data-mode="rack">Placer racks</button>
          <button data-mode="zone">Placer zones</button>
          <button data-mode="calibrate">Calibrer</button>
          <button data-mode="select">Sélectionner</button>
        </div>

        <div class="camera-tools">
          <button id="view-top">Vue dessus</button>
          <button id="view-iso">Vue 45°</button>
          <button id="reset-camera">Reset caméra</button>
        </div>

        <section class="properties" id="properties-panel">
          <h3>Propriétés</h3>
          <p id="empty-props">Aucun objet sélectionné.</p>
          <form id="props-form" hidden>
            <label>Nom <input id="prop-name" type="text" /></label>
            <label>Type <input id="prop-type" type="text" readonly /></label>
            <label>Largeur (m) <input id="prop-width" type="number" step="0.1" min="0.1" /></label>
            <label>Profondeur (m) <input id="prop-depth" type="number" step="0.1" min="0.1" /></label>
            <label>Hauteur (m) <input id="prop-height" type="number" step="0.1" min="0.1" /></label>
            <button type="submit">Enregistrer</button>
          </form>
        </section>
      </aside>

      <section class="map3d-stage panel">
        <div class="map3d-canvas-wrap">
          <canvas id="map3d-canvas"></canvas>
          <div id="map3d-tooltip" class="map3d-tooltip" hidden></div>
        </div>
      </section>
    </main>

    <script src="js/lib/three.min.js"></script>
    <script src="js/lib/OrbitControls.js"></script>
    <script src="js/map3d.js"></script>
  </body>
</html>
